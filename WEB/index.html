<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas de Viaje — Portada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1c1c1a;
  --paper: #f7f4ef;
  --line: #c8c4bc;
  --muted: #7a7670;
}
html { scroll-behavior: smooth; }
body { background: #000; color: var(--paper); font-family: 'DM Sans', sans-serif; }
a { color: inherit; text-decoration: none; }

/* CABECERA */
.masthead {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 28px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.masthead-logo {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 36px;
  color: #fff;
  letter-spacing: -1px;
}
.masthead-link {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.3);
  padding: 8px 20px;
  transition: all 0.2s;
}
.masthead-link:hover { color: #fff; border-color: #fff; }

/* HERO GRANDE */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: flex-end;
  justify-content: flex-start;
  overflow: hidden;
}
.hero img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  filter: brightness(0.45);
}
.hero-text {
  position: relative;
  z-index: 2;
  padding: 0 48px 64px;
}
.hero-text h1 {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 96px;
  line-height: 0.95;
  letter-spacing: -3px;
  margin-bottom: 20px;
}
.hero-text h1 i { color: rgba(255,255,255,0.45); }
.hero-text p {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 32px;
  max-width: 400px;
  line-height: 1.7;
}
.btn-entrar {
  display: inline-block;
  background: #fff;
  color: #1c1c1a;
  padding: 14px 36px;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
  transition: opacity 0.2s;
}
.btn-entrar:hover { opacity: 0.85; }

/* GRID DE FOTOS */
.foto-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 420px;
  gap: 3px;
  background: #000;
}
.foto-item {
  position: relative;
  overflow: hidden;
}
.foto-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.75);
  transition: transform 0.6s ease, filter 0.4s ease;
}
.foto-item:hover img { transform: scale(1.06); filter: brightness(0.9); }

.foto-label {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 2;
}
.foto-label .flag { font-size: 18px; display: block; margin-bottom: 4px; }
.foto-label .nombre {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 22px;
  color: #fff;
  display: block;
}

/* PIE */
footer {
  background: var(--ink);
  color: rgba(255,255,255,0.4);
  padding: 28px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
}
footer .footer-logo {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 20px;
  color: #fff;
}
.footer-links { display: flex; gap: 20px; }
.footer-links a:hover { color: #fff; }

@media (max-width: 768px) {
  .masthead { padding: 20px; }
  .hero-text { padding: 0 20px 48px; }
  .hero-text h1 { font-size: 56px; }
  .foto-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
  .foto-item.grande { grid-row: auto; }
  footer { padding: 24px 20px; flex-direction: column; gap: 16px; text-align: center; }
  .footer-links { flex-wrap: wrap; justify-content: center; }
}
</style>
</head>
<body>

<header class="masthead">
  <span class="masthead-logo">Atlas</span>
  <a href="guia_de_viaje.html" class="masthead-link">Ver la guía →</a>
</header>

<!-- HERO -->
<div class="hero">
  <img src="monte-fuji.jpg" alt="Monte Fuji, Japón">
  <div class="hero-text">
    <h1>El mundo<br><i>te espera.</i></h1>
    <p>Seis países. Seis experiencias únicas.</p>
    <a href="guia_de_viaje.html" class="btn-entrar">Explorar la guía</a>
  </div>
</div>

<!-- GRID FOTOS -->
<div class="foto-grid">

  <div class="foto-item">
    <img src="sagrada-familia.jpg" alt="España">
    <div class="foto-label">
      <span class="flag">🇪🇸</span>
      <span class="nombre"><b>España</b></span>
    </div>
  </div>

  <div class="foto-item">
    <img src="venecia.jpg" alt="Italia">
    <div class="foto-label">
      <span class="flag">🇮🇹</span>
      <span class="nombre"><b>Italia</b></span>
    </div>
  </div>

  <div class="foto-item">
    <img src="fushimi-inari.jpg" alt="Japón">
    <div class="foto-label">
      <span class="flag">🇯🇵</span>
      <span class="nombre"><b>Japón</b></span>
    </div>
  </div>

</div>

<footer>
  <span class="footer-logo">Atlas</span>
  <div class="footer-links">
    <a href="guia_de_viaje.html">La guía</a>
    <a href="#">Francia</a>
    <a href="#">España</a>
    <a href="#">Italia</a>
    <a href="#">EE.UU.</a>
    <a href="#">Turquía</a>
    <a href="#">Japón</a>
  </div>
  <span>© 2025 Atlas · Guía de Viaje</span>
</footer>

</body>
</html>
